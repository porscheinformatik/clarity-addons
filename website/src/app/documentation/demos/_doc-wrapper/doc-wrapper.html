<div class="dox-wrapper dox-header new-component-layout" [ngClass]="!showTabs ? 'dox-header-smaller' : ''">
  <section>
    <h1>
      {{ title }} @if (deprecated) {
      <span class="label label-warning clr-align-middle">
        Deprecated
        <span class="badge badge-warning">v7.0</span>
      </span>
      }
    </h1>
    @if (description) {
    <h5>{{ description }}</h5>
    } @if (showTabs) {
    <div class="dox-tabs">
      <ul class="list-unstyled" [scrollspy]="scrollable">
        <li>
          <a routerLink="." routerLinkActive="active" fragment="top" id="topTabLink" class="clrweb-tablink">
            Design Guidelines
          </a>
        </li>
        <li>
          <a routerLink="." routerLinkActive="active" fragment="examples" class="clrweb-tablink" id="guidelinesTabLink">
            Code &amp; Examples
          </a>
        </li>
      </ul>
    </div>
    }
  </section>
</div>

<section class="dox-content" hash-listener #scrollable>
  <div class="dox-content-wrapper">
    <a id="top"></a>
    <ng-content></ng-content>
  </div>
</section>
