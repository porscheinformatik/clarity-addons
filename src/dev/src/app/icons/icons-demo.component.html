<h2>Icons</h2>

<div class="clr-example">
  <div class="clr-row">
    @for (shape of shapes; track shape) {
    <div class="clr-col-2" style="margin-top: 1rem">
      <cds-icon [shape]="shape" size="24"></cds-icon>
      <span>{{ shape }}</span>
    </div>
    }
  </div>
</div>
