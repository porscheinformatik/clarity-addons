<div class="treetable">
  <div class="treetable-grid" role="grid">
    <div class="treetable-header" role="rowgroup" [class.hide-header]="clrHideHeader()">
      @if (showSelection() && !empty()) {
      <div class="treetable-row-selection treetable-column" role="columnheader">
        <div class="clr-checkbox-wrapper">
          <input
            type="checkbox"
            data-testId="clrTtSelectAll"
            [id]="selectAllId"
            [checked]="areAllRowsSelected()"
            (change)="toggleSelectAll()"
          />
          <!-- Usage of class clr-col-null here prevents clr-col-* classes from being added when a treetable is wrapped inside clrForm -->
          <label [for]="selectAllId" class="clr-control-label clr-col-null">
            <span class="clr-sr-only">{{ commonStrings.selectAll }}</span>
          </label>
        </div>
      </div>
      } @if (hasActionOverflow()) {
      <div class="treetable-row-actions treetable-column">&nbsp;</div>
      }
      <div class="treetable-row-scrollable">
        <ng-content select="clr-tt-column" />
      </div>
    </div>

    <div class="treetable-body">
      @if (isRecursionMode()) {
      <clr-tt-recursive-rows [children]="displayedNodes()" />
      } @else {
      <ng-content select="clr-tt-row" />
      } @if (empty() && !clrTtLoading()) {
      <ng-content select="clr-tt-placeholder" />
      }
    </div>
  </div>

  <ng-content select="clr-tt-footer"></ng-content>

  @if (clrTtLoading()) {
  <div class="treetable-spinner">
    <clr-spinner clrMedium />
  </div>
  }
</div>
