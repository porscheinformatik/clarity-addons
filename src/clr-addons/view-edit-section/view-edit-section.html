<div class="card view-edit-section" (keyup.escape)="onCancel()">
  <div class="card-block">
    <div class="card-title" [attr.cds-text]="_titleTextStyle + ' ' + _titleTextFontWeight">
      {{ _title }} @if (_isCollapsible && !editMode) {
      <button type="button" (click)="onCollapseExpand()" class="btn btn-icon btn-link ces-caret-btn">
        <cds-icon shape="angle" size="20" class="ces-caret-icon" [@rotateIcon]="_isCollapsed"></cds-icon>
      </button>
      }
      <div class="ves-actions">
        @if (_editable && !editMode && actionBlock.children.length == 0) {
        <button type="button" (click)="onEdit()" class="btn btn-icon btn-link ves-action">
          <cds-icon class="ves-edit-icon" [shape]="_editIcon" size="20"></cds-icon>
        </button>
        }
        <div #actionBlock>
          <ng-content select="[action-block]"></ng-content>
        </div>
      </div>
    </div>
    @if (!(_isCollapsed && _isCollapsible)) {
    <div class="card-text" [@collapseExpandAnimation]="initialized">
      @if (!editMode) {
      <ng-template [ngTemplateOutlet]="viewRef"></ng-template>
      } @if (editMode) {
      <ng-template [ngTemplateOutlet]="editRef"></ng-template>
      } @if (editMode) {
      <form clrForm (ngSubmit)="onSubmit()" class="button-bar">
        <button class="btn btn-primary ves-save" type="submit">{{ _saveText }}</button>
        <button class="btn ves-cancel" (click)="onCancel()" type="button">{{ _cancelText }}</button>
      </form>
      }
    </div>
    }
  </div>
</div>
