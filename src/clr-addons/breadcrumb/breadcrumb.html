@if (breadcrumbElements.length) {
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    @for (breadcrumbItem of breadcrumbElements; track breadcrumbItem) { @if (breadcrumbItem.url) {
    <li class="breadcrumb-item">
      <a [routerLink]="breadcrumbItem.url">{{breadcrumbItem.label}}</a>
    </li>
    } @if (!breadcrumbItem.url) {
    <li class="breadcrumb-item active">{{breadcrumbItem.label}}</li>
    } }
  </ol>
</nav>
}
