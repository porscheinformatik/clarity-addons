<!-- Static gallery view -->
<div class="clr-image-gallery" [style.width.px]="spotlightSize()">
  <!-- Spotlight image -->
  <div
    class="clr-image-gallery__spotlight"
    [style.width.px]="spotlightSize()"
    [style.height.px]="spotlightSize()"
    (click)="openModal(0)"
  >
    @if (images().length > 0) {
    <img
      [ngSrc]="images()[0].src"
      [width]="spotlightSize()"
      [height]="spotlightSize()"
      [alt]="images()[0].alt || ''"
      class="clr-image-gallery__spotlight-img"
    />
    }
  </div>

  <!-- Thumbnail row -->
  @if (images().length > 1) {
  <div class="clr-image-gallery__thumbs">
    @for (img of staticThumbnails(); track img; let i = $index) {
    <div
      class="clr-image-gallery__thumb"
      [style.width.px]="thumbnailSize()"
      [style.height.px]="thumbnailSize()"
      (click)="openModal(i + 1)"
    >
      <img
        [ngSrc]="img.src"
        [width]="thumbnailSize()"
        [height]="thumbnailSize()"
        [alt]="img.alt || ''"
        class="clr-image-gallery__thumb-img"
      />
      <!-- Overlay on last thumbnail when there are more images -->
      @if (i === maxThumbnails - 1 && remainingCount() > 0) {
      <div class="clr-image-gallery__thumb-overlay">
        <span>{{ remainingCount() }}+</span>
      </div>
      }
    </div>
    }
  </div>
  }
</div>

<!-- Built-in modal (only when useBuiltInModal is true) -->
@if (useBuiltInModal() && modalOpen()) {
<div class="clr-image-gallery-backdrop" (click)="onBackdropClick($event)" role="dialog" aria-modal="true">
  <div class="clr-image-gallery-modal">
    <clr-image-carousel
      [images]="images()"
      [productName]="productName()"
      [initialIndex]="activeIndex()"
      [imageSize]="carouselImageSize()"
      [thumbnailSize]="carouselThumbnailSize()"
      (closeCarousel)="closeModal()"
    ></clr-image-carousel>
  </div>
</div>
}
