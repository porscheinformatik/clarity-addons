@if ((active$ | async)) {
<nav aria-label="history" class="history-container">
  <ol class="history">
    <!-- dummy entry with no visible content to reserve space for the history header -->
    <li>&nbsp;</li>
    @for (historyItem of historyElements$ | async; track historyItem) { @if (historyItem.url) {
    <li class="history-item">
      <a [href]="historyItem.url">{{ historyItem.title }}</a>
    </li>
    } }
  </ol>
</nav>
}
