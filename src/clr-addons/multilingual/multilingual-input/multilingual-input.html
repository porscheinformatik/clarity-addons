<ng-content select="label"></ng-content>
<div class="clr-control-container" [ngClass]="controlClasses">
  @if (showLanguageSelector()) {
  <clr-multilingual-selector
    [disabled]="disabled"
    [texts]="shownTexts"
    [selectedLang]="selectedLang"
    (selectedLangChange)="changeLanguage($event)"
  >
  </clr-multilingual-selector>
  } @if (readonly || readonly === '') {
  <span [title]="!!shownTexts && !!selectedLang ? shownTexts.get(selectedLang) : ''" class="text-truncate">
    {{ !!shownTexts && !!selectedLang ? shownTexts.get(selectedLang) : '' }}
  </span>
  } @else {
  <div class="clr-multi-input-wrapper">
    <div class="clr-input-wrapper">
      <input
        class="clr-input"
        type="text"
        [id]="inputId"
        [ngModel]="!!shownTexts && !!selectedLang ? shownTexts.get(selectedLang) : ''"
        (ngModelChange)="setText(selectedLang, $event)"
        (blur)="onTouch()"
        [disabled]="disabled"
        autocomplete="off"
        [maxlength]="maxlength || null"
        #input
      />
      @if (showError) {
      <cds-icon class="clr-validate-icon" shape="exclamation-circle" aria-hidden="true"></cds-icon>
      }
    </div>
    @if (!showError) {
    <ng-content select="clr-control-helper"></ng-content>
    } @if (showError) {
    <ng-content select="clr-control-error"></ng-content>
    }
  </div>
  }
</div>
