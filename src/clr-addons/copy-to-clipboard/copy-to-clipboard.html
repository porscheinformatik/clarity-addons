<clr-tooltip>
  <cds-icon
    clrTooltipTrigger
    class="copy-to-clipboard-icon"
    [cdkCopyToClipboard]="trimmedValue()"
    (cdkCopyToClipboardCopied)="onCopied($event)"
    [attr.shape]="showCopiedIcon ? 'success-standard' : 'copy-to-clipboard'"
    [ngClass]="{ 'attribute-was-copied-color': showCopiedIcon }"
    (click)="$event.stopPropagation()"
    (keydown.enter)="$event.stopPropagation()"
    (mousedown)="$event.preventDefault()"
  ></cds-icon>
  <clr-tooltip-content
    class="clr-tooltip-fit-content"
    [clrSize]="tooltipSize"
    [clrPosition]="tooltipPosition"
    *clrIfOpen
    >{{ tooltipText() }}</clr-tooltip-content
  >
</clr-tooltip>
