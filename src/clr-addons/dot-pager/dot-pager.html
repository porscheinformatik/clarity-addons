@if (pages > 0) {
<clr-radio-container clrInline>
  @for (a of pageArray(); track a; let page = $index) {
  <clr-radio-wrapper>
    <input clrRadio type="radio" [value]="page+1" [(ngModel)]="currentPage" name="{{uniqueName}}" />
    <label>&nbsp;</label>
  </clr-radio-wrapper>
  }
</clr-radio-container>
}
